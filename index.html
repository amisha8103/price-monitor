<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Price Monitor</title>
</head>
<body>

<h1>📊 Dashboard</h1>
<div id="dashboard"></div>

<h1>🛍️ Products</h1>
<input type="number" id="minPrice" placeholder="Min Price">
<input type="number" id="maxPrice" placeholder="Max Price">
<input type="text" id="source" placeholder="Source (e.g. 1stdibs)">
<input type="text" id="category" placeholder="Category">
<button onclick="loadProducts(); loadDashboard()">Filter</button>

<ul id="productList"></ul>

<h1>📈 Product Detail</h1>
<div id="productDetail"></div>

<script>
const API_KEY = "beccc0d7-608b-44ce-b95a-f0629e9eebcc";
const BASE_URL = "http://127.0.0.1:8000";

async function loadDashboard() {
    let source = document.getElementById("source").value.trim();
    let category = document.getElementById("category").value.trim();

    let params = [];

    if (source) params.push("source=" + source);
    if (category) params.push("category=" + category);

    let url = BASE_URL + "/analytics";
    if (params.length > 0) url += "?" + params.join("&");

    console.log("Dashboard URL:", url);

    const res = await fetch(url, {
        headers: { "api-key": API_KEY }
    });

    const data = await res.json();
    console.log("Dashboard data:", data); //  IMPORTANT

    let html = "";

    //  GLOBAL
    html += "Total: " + (data.total_products ?? 0) +
            " | Avg Price: " + (data.average_price ?? 0).toFixed(2) +
            "<br><br>";

    //  SAFE SOURCE LOOP
    html += "<b>By Source:</b><br>";

    if (data.source_summary && Array.isArray(data.source_summary)) {
        data.source_summary.forEach(s => {
            const avg = (s.avg_price ?? 0).toFixed(2);
            html += `${s.source}: count → ${s.count}, avg price → $${avg}<br>`;
        });
    } else {
        html += "No source data<br>";
    }

    //  SAFE CATEGORY LOOP
    if (source || category) {
        html += "<br><b>Avg by Category:</b><br>";

        if (data.average_price_by_category && Array.isArray(data.average_price_by_category)) {
            data.average_price_by_category.forEach(c => {
                const avg = (c.avg_price ?? 0).toFixed(2);
                html += `${c.category}: count → ${c.count ?? 0}, avg price → $${avg}<br>`;
            });
        } else {
            html += "No category data<br>";
        }
    }

    document.getElementById("dashboard").innerHTML = html;
}
async function loadProducts() {
    let min = document.getElementById("minPrice").value;
    let max = document.getElementById("maxPrice").value;
    let category = document.getElementById("category").value.trim();
    let source = document.getElementById("source").value;

    if (category) {
        category = category.charAt(0).toUpperCase() + category.slice(1).toLowerCase();
    }

    let params = [];

    if (min) params.push("min_price=" + min);
    if (max) params.push("max_price=" + max);
    if (category) params.push("category=" + category);
    if (source) params.push("source=" + source);

    let url = BASE_URL + "/products?" + params.join("&");

    const res = await fetch(url, {
        headers: { "api-key": API_KEY }
    });

    const products = await res.json();

    const list = document.getElementById("productList");
    list.innerHTML = "";

    products.forEach(p => {
        const li = document.createElement("li");
        li.innerHTML = `${p.name} - $${p.price} 
            <button onclick="loadProduct(${p.id})">View</button>`;
        list.appendChild(li);
    });
}

async function loadProduct(id) {
    const res = await fetch(BASE_URL + "/products/" + id, {
        headers: { "api-key": API_KEY }
    });

    const data = await res.json();

    let html = `<h3>${data.name}</h3>`;
    html += `<p><b>Price:</b> $${data.price}</p>`;
    html += `<p><b>Brand:</b> ${data.brand}</p>`;
    html += `<p><b>Source:</b> ${data.source}</p>`;

    html += "<h4>Price History:</h4><ul>";

    data.history.forEach(h => {
        html += `<li>$${h.price} — ${new Date(h.timestamp).toLocaleString()}</li>`;
    });

    html += "</ul>";

    document.getElementById("productDetail").innerHTML = html;
}

loadDashboard();
loadProducts();
</script>

</body>
</html>
